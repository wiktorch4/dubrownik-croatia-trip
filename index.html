<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Dubrownik — 6–10 maja</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  :root {
    --sand: #f5efe6;
    --parchment: #ede3d4;
    --warm-white: #faf7f2;
    --terracotta: #c9674d;
    --terracotta-light: #e08060;
    --stone: #8a7d70;
    --dark: #2a2219;
    --ink: #3d3328;
    --sea: #3d7a8a;
    --sea-light: #6aadbc;
    --gold: #b8963e;
    --gold-light: #d4aa52;
    --shadow: rgba(42,34,25,0.12);
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--warm-white);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    background: var(--dark);
    color: var(--sand);
    padding: 28px 20px 22px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 60% at 50% 120%, rgba(201,103,77,0.35) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 10% 0%, rgba(61,122,138,0.2) 0%, transparent 60%);
    pointer-events: none;
  }
  header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 7vw, 2.8rem);
    font-weight: 300;
    letter-spacing: 0.04em;
    line-height: 1.1;
    position: relative;
  }
  header h1 em {
    font-style: italic;
    color: var(--terracotta-light);
  }
  header .sub {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--stone);
    margin-top: 6px;
    position: relative;
  }
  .header-line {
    width: 40px;
    height: 1px;
    background: var(--terracotta);
    margin: 14px auto 0;
    position: relative;
  }

  /* ── NAV TABS ── */
  .tabs {
    display: flex;
    background: var(--dark);
    border-top: 1px solid rgba(255,255,255,0.07);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .tab-btn {
    flex: 1;
    padding: 12px 6px;
    background: none;
    border: none;
    color: var(--stone);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: color .2s, border-color .2s;
    border-bottom: 2px solid transparent;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .tab-btn .icon { font-size: 1.1rem; }
  .tab-btn.active {
    color: var(--terracotta-light);
    border-bottom-color: var(--terracotta);
  }

  /* ── VIEWS ── */
  .view { display: none; }
  .view.active { display: block; }

  /* ── MAP ── */
  #map {
    width: 100%;
    height: calc(100vh - 110px);
  }
  .leaflet-popup-content-wrapper {
    border-radius: var(--radius) !important;
    box-shadow: 0 8px 32px var(--shadow) !important;
    border: none !important;
    overflow: hidden;
    padding: 0 !important;
  }
  .leaflet-popup-content { margin: 0 !important; width: auto !important; }
  .popup-card {
    width: 220px;
    font-family: 'DM Sans', sans-serif;
  }
  .popup-card img {
    width: 100%;
    height: 110px;
    object-fit: cover;
    display: block;
  }
  .popup-body { padding: 10px 12px 12px; }
  .popup-body .day-tag {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--terracotta);
    font-weight: 500;
    margin-bottom: 3px;
  }
  .popup-body strong {
    font-size: 0.9rem;
    color: var(--dark);
    display: block;
    line-height: 1.3;
    margin-bottom: 4px;
  }
  .popup-body p {
    font-size: 0.72rem;
    color: var(--stone);
    line-height: 1.45;
  }

  /* custom marker colors per day */
  .marker-pin {
    width: 28px; height: 28px;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    border: 2px solid white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .day6 { background: var(--sea); }
  .day7 { background: var(--terracotta); }
  .day8 { background: var(--gold); }
  .day9 { background: #7a5c8a; }
  .day10 { background: #4a8a5c; }
  .custom { background: var(--stone); }

  /* ── ITINERARY ── */
  .itinerary { padding: 0 0 40px; }

  .day-block {
    margin-bottom: 4px;
  }
  .day-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 18px 20px 16px;
    background: var(--warm-white);
    cursor: pointer;
    border-bottom: 1px solid var(--parchment);
    user-select: none;
    transition: background .15s;
  }
  .day-header:active { background: var(--parchment); }
  .day-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .day-header h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    font-weight: 400;
    flex: 1;
    line-height: 1.1;
  }
  .day-header h2 span {
    display: block;
    font-size: 0.65rem;
    font-family: 'DM Sans', sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--stone);
    font-weight: 400;
    margin-bottom: 1px;
  }
  .day-chevron {
    color: var(--stone);
    font-size: 0.9rem;
    transition: transform .25s;
  }
  .day-block.open .day-chevron { transform: rotate(90deg); }

  .day-content { display: none; }
  .day-block.open .day-content { display: block; }

  .location-card {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--parchment);
    background: white;
    overflow: hidden;
    cursor: pointer;
    transition: background .15s;
  }
  .location-card:active { background: var(--sand); }
  .location-card:last-child { border-bottom: none; }

  .card-accent {
    width: 4px;
    flex-shrink: 0;
  }
  .card-img {
    width: 90px;
    height: 90px;
    flex-shrink: 0;
    object-fit: cover;
    display: block;
  }
  .card-img-placeholder {
    width: 90px;
    height: 90px;
    flex-shrink: 0;
    background: var(--parchment);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
    color: var(--stone);
  }
  .card-text {
    padding: 12px 14px;
    flex: 1;
    min-width: 0;
  }
  .card-time {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--stone);
    margin-bottom: 3px;
  }
  .card-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--dark);
    line-height: 1.2;
    margin-bottom: 4px;
  }
  .card-desc {
    font-size: 0.72rem;
    color: var(--stone);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-tip {
    display: inline-block;
    margin-top: 5px;
    font-size: 0.65rem;
    background: var(--parchment);
    color: var(--stone);
    padding: 2px 7px;
    border-radius: 20px;
    font-style: italic;
  }

  /* ── ADD LOCATION ── */
  .add-view { padding: 24px 20px 48px; }
  .add-view h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 300;
    margin-bottom: 4px;
  }
  .add-view p {
    font-size: 0.78rem;
    color: var(--stone);
    margin-bottom: 24px;
  }

  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--stone);
    margin-bottom: 6px;
    font-weight: 500;
  }
  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 11px 14px;
    border: 1px solid var(--parchment);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    background: white;
    color: var(--ink);
    outline: none;
    transition: border-color .2s;
    -webkit-appearance: none;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    border-color: var(--terracotta);
  }
  .form-group textarea { resize: vertical; min-height: 80px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .btn-primary {
    width: 100%;
    padding: 14px;
    background: var(--terracotta);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: background .2s, transform .1s;
    margin-top: 8px;
  }
  .btn-primary:active { background: #b05840; transform: scale(0.99); }

  .custom-locations-list { margin-top: 32px; }
  .custom-locations-list h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 400;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--parchment);
  }
  .custom-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--parchment);
  }
  .custom-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--stone);
    margin-top: 5px;
    flex-shrink: 0;
  }
  .custom-item-text { flex: 1; min-width: 0; }
  .custom-item-name {
    font-size: 0.88rem;
    font-weight: 500;
    color: var(--dark);
  }
  .custom-item-meta {
    font-size: 0.7rem;
    color: var(--stone);
    margin-top: 2px;
  }
  .custom-item-delete {
    background: none;
    border: none;
    color: var(--stone);
    font-size: 1rem;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    transition: color .15s;
    flex-shrink: 0;
  }
  .custom-item-delete:hover { color: var(--terracotta); }

  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--dark);
    color: var(--sand);
    padding: 10px 20px;
    border-radius: 40px;
    font-size: 0.78rem;
    letter-spacing: 0.03em;
    z-index: 9999;
    transition: transform .3s cubic-bezier(.34,1.56,.64,1);
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* day color helpers */
  .c6 { background: var(--sea); }
  .c7 { background: var(--terracotta); }
  .c8 { background: var(--gold); }
  .c9 { background: #7a5c8a; }
  .c10 { background: #4a8a5c; }

  /* leaflet overrides */
  .leaflet-control-attribution { font-size: 9px !important; }
</style>
</head>
<body>

<header>
  <h1><em>Dubrovnik</em><br>6 – 10 maja</h1>
  <p class="sub">Plan podróży</p>
  <div class="header-line"></div>
</header>

<nav class="tabs">
  <button class="tab-btn active" onclick="switchView('itinerary',this)" data-view="itinerary">
    <span class="icon">📋</span>Plan
  </button>
  <button class="tab-btn" onclick="switchView('map',this)" data-view="map">
    <span class="icon">🗺</span>Mapa
  </button>
  <button class="tab-btn" onclick="switchView('add',this)" data-view="add">
    <span class="icon">＋</span>Dodaj
  </button>
</nav>

<!-- MAP VIEW -->
<div id="view-map" class="view">
  <div id="map"></div>
</div>

<!-- ITINERARY VIEW -->
<div id="view-itinerary" class="view active">
  <div class="itinerary" id="itinerary-container"></div>
</div>

<!-- ADD VIEW -->
<div id="view-add" class="view">
  <div class="add-view">
    <h2>Dodaj lokację</h2>
    <p>Twoje miejsca pojawią się na mapie i w planie.</p>

    <div class="form-group">
      <label>Nazwa miejsca *</label>
      <input type="text" id="f-name" placeholder="np. Restauracja Proto">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Dzień</label>
        <select id="f-day">
          <option value="6">6 maja</option>
          <option value="7">7 maja</option>
          <option value="8">8 maja</option>
          <option value="9">9 maja</option>
          <option value="10">10 maja</option>
        </select>
      </div>
      <div class="form-group">
        <label>Godzina</label>
        <input type="time" id="f-time" value="12:00">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Szerokość (lat)</label>
        <input type="number" id="f-lat" placeholder="42.640" step="0.0001">
      </div>
      <div class="form-group">
        <label>Długość (lng)</label>
        <input type="number" id="f-lng" placeholder="18.110" step="0.0001">
      </div>
    </div>
    <div class="form-group">
      <label>Opis (opcjonalnie)</label>
      <textarea id="f-desc" placeholder="Krótka notatka o miejscu..."></textarea>
    </div>
    <div class="form-group">
      <label>URL zdjęcia (opcjonalnie)</label>
      <input type="url" id="f-img" placeholder="https://...">
    </div>

    <button class="btn-primary" onclick="addCustomLocation()">Dodaj do planu</button>

    <div class="custom-locations-list" id="custom-list-container" style="display:none">
      <h3>Twoje miejsca</h3>
      <div id="custom-list"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ── STATE ─────────────────────────────────────────────────────────────────────
let customLocations = JSON.parse(localStorage.getItem('dubrovnik-custom') || '[]');
let map = null;
let markers = [];

// ── TABS ──────────────────────────────────────────────────────────────────────
function switchView(name, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  btn.classList.add('active');

  if (name === 'map') {
    setTimeout(() => {
      initMap();
      map.invalidateSize();
    }, 50);
  }
  if (name === 'add') renderCustomList();
}

// ── ITINERARY ─────────────────────────────────────────────────────────────────
function renderItinerary() {
  const container = document.getElementById('itinerary-container');
  container.innerHTML = '';

  DAYS.forEach(day => {
    const allLocs = [...day.locations, ...customLocations.filter(c => c.day == day.day)];

    const block = document.createElement('div');
    block.className = 'day-block' + (day.open ? ' open' : '');
    block.innerHTML = `
      <div class="day-header" onclick="toggleDay(this.parentElement)">
        <div class="day-dot ${day.colorClass}"></div>
        <h2><span>${day.label}</span>${day.theme}</h2>
        <span class="day-chevron">›</span>
      </div>
      <div class="day-content">${allLocs.map(loc => locCard(loc, day)).join('')}</div>
    `;
    container.appendChild(block);
  });
}

function locCard(loc, day) {
  const imgHtml = loc.img
    ? `<img class="card-img" src="${loc.img}" alt="${loc.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
    : '';
  const placeholderHtml = `<div class="card-img-placeholder" style="${loc.img ? 'display:none' : ''}">${loc.emoji || '📍'}</div>`;
  const tipHtml = loc.tip ? `<span class="card-tip">💡 ${loc.tip}</span>` : '';
  return `
    <div class="location-card" onclick="flyToLocation(${loc.lat}, ${loc.lng})">
      <div class="card-accent ${day.colorClass}"></div>
      ${imgHtml}${placeholderHtml}
      <div class="card-text">
        ${loc.time ? `<div class="card-time">${loc.time}</div>` : ''}
        <div class="card-name">${loc.name}</div>
        <div class="card-desc">${loc.desc}</div>
        ${tipHtml}
      </div>
    </div>
  `;
}

function toggleDay(block) {
  block.classList.toggle('open');
}

// ── MAP ───────────────────────────────────────────────────────────────────────
function initMap() {
  if (map) return;

  map = L.map('map', { zoomControl: true }).setView([42.6409, 18.1104], 13);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO',
    maxZoom: 19
  }).addTo(map);

  plotAllMarkers();
}

function plotAllMarkers() {
  markers.forEach(m => m.remove());
  markers = [];

  DAYS.forEach(day => {
    const allLocs = [...day.locations, ...customLocations.filter(c => c.day == day.day)];
    allLocs.forEach(loc => {
      if (!loc.lat || !loc.lng) return;

      const isCustom = !day.locations.find(l => l.id === loc.id);
      const pinClass = isCustom ? 'custom' : day.markerClass;
      const icon = L.divIcon({
        html: `<div class="marker-pin ${pinClass}"></div>`,
        iconSize: [28, 28],
        iconAnchor: [14, 28],
        popupAnchor: [0, -28],
        className: ''
      });

      const imgTag = loc.img
        ? `<img src="${loc.img}" alt="${loc.name}" onerror="this.src='https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=300&q=70'">`
        : '';

      const popup = L.popup({ maxWidth: 240, minWidth: 220 }).setContent(`
        <div class="popup-card">
          ${imgTag}
          <div class="popup-body">
            <div class="day-tag">${day.label} ${loc.time ? '· ' + loc.time : ''}</div>
            <strong>${loc.name}</strong>
            <p>${loc.desc ? loc.desc.substring(0, 100) + (loc.desc.length > 100 ? '…' : '') : ''}</p>
          </div>
        </div>
      `);

      const marker = L.marker([loc.lat, loc.lng], { icon }).bindPopup(popup).addTo(map);
      markers.push(marker);
    });
  });
}

function flyToLocation(lat, lng) {
  switchView('map', document.querySelector('[data-view="map"]'));
  setTimeout(() => {
    initMap();
    map.invalidateSize();
    map.flyTo([lat, lng], 16, { duration: 1.2 });
    const m = markers.find(mk => {
      const latlng = mk.getLatLng();
      return Math.abs(latlng.lat - lat) < 0.0001 && Math.abs(latlng.lng - lng) < 0.0001;
    });
    if (m) setTimeout(() => m.openPopup(), 1300);
  }, 80);
}

// ── ADD LOCATION ──────────────────────────────────────────────────────────────
function addCustomLocation() {
  const name = document.getElementById('f-name').value.trim();
  const day = parseInt(document.getElementById('f-day').value);
  const time = document.getElementById('f-time').value;
  const lat = parseFloat(document.getElementById('f-lat').value);
  const lng = parseFloat(document.getElementById('f-lng').value);
  const desc = document.getElementById('f-desc').value.trim();
  const img = document.getElementById('f-img').value.trim();

  if (!name) { showToast('Podaj nazwę miejsca'); return; }

  const newLoc = {
    id: 'custom-' + Date.now(),
    name, day, time, lat: isNaN(lat) ? null : lat, lng: isNaN(lng) ? null : lng, desc, img,
    emoji: '📍'
  };

  customLocations.push(newLoc);
  localStorage.setItem('dubrovnik-custom', JSON.stringify(customLocations));

  // reset form
  ['f-name','f-desc','f-img'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-lat').value = '';
  document.getElementById('f-lng').value = '';

  renderItinerary();
  renderCustomList();
  if (map) plotAllMarkers();
  showToast('✓ Dodano: ' + name);
}

function deleteCustom(id) {
  customLocations = customLocations.filter(c => c.id !== id);
  localStorage.setItem('dubrovnik-custom', JSON.stringify(customLocations));
  renderItinerary();
  renderCustomList();
  if (map) plotAllMarkers();
  showToast('Usunięto miejsce');
}

function renderCustomList() {
  const container = document.getElementById('custom-list-container');
  const list = document.getElementById('custom-list');
  if (customLocations.length === 0) { container.style.display = 'none'; return; }
  container.style.display = 'block';
  list.innerHTML = customLocations.map(c => `
    <div class="custom-item">
      <div class="custom-dot"></div>
      <div class="custom-item-text">
        <div class="custom-item-name">${c.name}</div>
        <div class="custom-item-meta">${c.day} maja · ${c.time || '—'}</div>
      </div>
      <button class="custom-item-delete" onclick="deleteCustom('${c.id}')">✕</button>
    </div>
  `).join('');
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderItinerary();
</script>
